body:
  text: 西太原寺沙門懷素集設諫篇第十四諫隨順被舉比丘法時闡陀比丘比丘僧中為作舉如法如律如佛所教不順從不懺悔僧未與作共住時有比丘尼名尉次往返承事闡陀比丘佛言聽僧與尉次比丘尼作呵諫白四羯磨諸比丘尼語此比丘尼言此比丘僧與作舉如法如律如佛所教不順從不懺悔僧未與作共住汝莫隨順可捨此事莫為僧所舉更犯重罪若隨語者善若不隨語者當作白白已復應語言妹當知我已白餘有羯磨在汝捨此事莫為僧所舉更犯重罪若隨語者善若不隨語者當作初羯磨作初羯磨已當語言妹我已與汝作白初羯磨餘有二羯磨在汝可捨此事莫為僧所舉更犯重罪若隨語者善若不隨語者當作第二羯磨作第二羯磨已當復語言妹知不我已作白二羯磨餘有一羯磨在汝捨此事莫為僧所舉更犯重罪若隨語者善若不隨語者作第三羯磨作第三羯磨竟波羅夷白二羯磨竟捨者三偷蘭遮白一羯磨竟捨者二偷蘭遮白竟捨者一偷蘭遮若作白未竟捨者突吉羅若未白前隨順所舉比丘一切突吉羅羯磨法體具如律明也諫破僧法若比丘尼方便欲破和合僧受破僧法堅持不捨彼比丘尼當諫此比丘尼言大姊莫方便欲破和合僧莫受破僧法堅持不捨大姊當與僧和合歡喜不諍同一水乳於佛法中有增益安樂住大姊可捨此事莫令僧作呵諫而犯重罪若用語者善若不用語者復令比丘比丘尼優婆塞優婆夷若王大臣種種異道沙門婆羅門等若餘方比丘尼聞知其人信用言者應來若用言者善若不用言者應作白作白已應更求大姊我已白竟餘有羯磨在汝今可捨此事莫令僧為汝作羯磨更犯重罪若用語者善若不用語者應作初羯磨作初羯磨已應更求大姊我已白作初羯磨竟餘有二羯磨在汝可捨此事莫令僧更為汝作羯磨而犯重罪若用言者善若不用言者應作第二羯磨作第二已應更求云大姊我已作白二羯磨竟餘有一羯磨在汝可捨此事莫令僧更為汝作羯磨而犯重罪若能捨者善若不能捨者與説第三羯磨説第三羯磨竟僧伽婆尸沙作白二羯磨竟捨者三偷蘭遮作白一羯磨竟捨者二偷蘭遮作白竟捨者一偷蘭遮若初白未竟捨者突吉羅若一切未白前方便欲破和合僧受破和合僧法堅持不捨一切突吉羅羯磨法體具如律明諫破僧助伴法僧衆諫彼破僧比丘尼時復有非法群黨比丘尼一二三衆多語諸比丘尼言大姊莫諫此比丘尼此比丘尼是法語比丘尼律語比丘尼此比丘尼所説我等忍可諸比丘尼應語言汝莫作是語言此比丘尼是法語比丘尼律語比丘尼此比丘尼所説我等忍可而此比丘尼非法語比丘尼非律語比丘尼汝等莫壞和合僧當助和合僧大姊與僧和合歡喜不諍等如前羯磨法體亦如律明諫被擯謗僧法若有比丘尼行惡行污他家見聞皆具僧作擯法便謗僧言諸比丘尼有愛有恚有怖有癡有如是同罪比丘尼有驅者有不驅者諸比丘尼應語彼言大姊污他家亦見亦聞行惡行亦見亦聞大姊污他家行惡行捨此事莫為僧所呵更犯重罪若隨語者善若不隨語者乃至與説第三如上白四法體亦如律明諫惡性不受語法若有比丘尼惡性不受人語諸比丘尼以戒律如法教受自身作不可共語語諸比丘尼言大姊莫語我若好若惡我亦不語諸大姊若好若惡大姊止不須諫我彼比丘尼諫此比丘尼言大姊莫自作不可共語當作可共語大姊如法諫諸比丘尼諸比丘尼亦當如法諫大姊如是佛弟子衆得增益展轉相教展轉相諫展轉懺悔大姊可捨此事莫為僧所呵更犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明爾諫習近住法時有二比丘尼一名蘇摩二名婆頗夷常相近住共作惡行惡聲流布展轉共相覆罪餘比丘尼語言大姊汝等二人莫相近共作惡行惡聲流布展轉共相覆罪汝等若不相親近共作惡行惡聲流布展轉共相覆罪者於佛法中有增益安樂住而彼猶故不改佛言聽僧與作呵諫捨此事故白四羯磨餘比丘尼諫此比丘尼言大姊汝等莫共相近共作惡行惡聲流布共相覆罪汝等若不相親近共作惡行惡聲流布於佛法中得增益安樂住汝等宜捨此事勿為僧所呵更犯重罪若隨語者善若不隨語者乃至與説第三如上白四法體亦如律明諫謗僧勸習近住法時二習近住比丘尼為僧呵諫已六群比丘尼等教作如是言汝等當共住何以故我亦見餘比丘尼共住共相親近共作惡行惡聲流布共相覆罪衆僧以恚故教汝等別住佛言聽僧與六群比丘尼等作呵責白四羯磨是比丘尼應諫彼比丘尼言大姊汝莫教餘比丘尼言汝等莫別住當共住我亦見餘比丘尼共相親近共作惡行惡聲流布共相覆罪僧以恚故教汝等別住今正有此二比丘尼更無有餘汝共相親近共作惡行惡聲流布共相覆罪若此比丘尼別住者於佛法有增益安樂住汝今可捨此事莫為僧所呵更犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明諫瞋心捨三寶法時六群比丘尼趣以一小事瞋恚不喜便作是語我捨佛捨法捨僧不獨有此沙門釋子更有餘沙門婆羅門修梵行者我等亦可於彼修梵行佛言聽僧作呵責捨此事故白四羯磨是比丘尼諫彼比丘尼言大姊汝莫趣以一小事瞋恚不喜便作是語我捨佛捨法捨僧不獨有此沙門釋子更有餘沙門婆羅門修梵行者我等亦可於彼修梵行汝捨此事莫為僧所呵責更犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明諫發起四諍謗僧法時有比丘尼名黑喜鬪不善憶持諍事後遂瞋恚作是言僧有愛有恚有怖有癡佛言聽僧與黑比丘尼作呵責捨此事故白四羯磨是比丘尼當諫彼比丘尼言大姊汝莫喜鬪諍不善憶持諍事後瞋恚作是語僧有愛有恚有怖有癡而僧不愛不恚不怖不癡汝自有愛有恚有怖有癡汝今可捨此事莫為僧所呵責更犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明諫惡見説欲不障道法若有比丘尼作如是言我知佛所説法行淫欲非障道法諸善比丘尼應諫此比丘尼言汝莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便説行淫欲是障道法汝今可捨此事莫為僧所呵更犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明諫式叉摩那及沙彌尼法同此無異諫習近居士子法時有比丘尼親近居士居士兒共住作不隨順行時諸比丘尼諫言汝莫親近居士居士兒作不隨順行汝妹可別住汝若別住於佛法中得增益安樂而彼故不別住佛言聽僧與彼比丘尼作呵責捨此事故白四羯磨是比丘尼諫彼比丘尼言妹莫親近居士居士兒作不隨順行汝當別住汝若別住於佛法有增益安樂汝今可捨此事莫為僧所呵責而犯重罪若隨語者善若不隨語者乃至第三如上白四法體亦如律明諫犯罪法若有比丘尼欲犯波羅夷乃至惡説諸比丘尼如法諫此比丘尼言大姊莫作是此不應作大姊所作非法非律非佛所教然此比丘尼不從諸善比丘尼如法諫勸即便犯戒若此比丘尼自知所作是明他諫者非故作犯根本不從語者突吉羅若此比丘尼自知所作非明他諫者是故作犯根本不從語者波逸提若無智人不知諫法應語彼云汝可問汝和上阿闍梨更學問誦經知諫法已然後設諫此一諫法通防止作不同僧諫隨事別立滅諍篇第十五與現前毗尼法若有比丘尼人不在現前便作羯磨佛言不應人不現前而作羯磨自今已去與諸比丘尼結現前毗尼滅諍應如是説現前毗尼但現前有五謂法毗尼人僧界云何法現前所持法滅諍者是云何毗尼現前所持毗尼滅諍者是云何人現前言義往返者是云何僧現前同羯磨和合集一處不來者囑授在現前應呵者不呵者是云何界現前在界內羯磨作制限者是與憶念毗尼法若有比丘尼實不犯重罪波羅夷僧伽婆尸沙偷蘭遮有諸比丘尼皆言犯重罪問言汝憶犯重罪不彼不憶犯答言我不憶犯如是罪即語諸比丘尼言妹莫數詰問我諸比丘尼故詰問不止佛言聽僧為作憶念毗尼白四羯磨乞作如文自今已去與諸比丘尼結憶念毗尼滅諍應如是説憶念毗尼云何憶念毗尼彼比丘尼此罪更不應作舉作憶念與不癡毗尼法若有比丘尼癡狂心亂多犯衆罪非沙門法言無齊限行來出入不順威儀後還得心有諸比丘尼言犯重罪波羅夷僧伽婆尸沙問言汝憶犯重罪不彼即答言我先癡狂心亂時多犯衆罪非我故作是狂癡耳諸妹不須數見難詰諸比丘尼故難詰不止佛言聽僧與作不癡毗尼白四羯磨乞作如文自今已去與諸比丘尼結不癡毗尼滅諍應如是説不癡毗尼云何不癡毗尼彼比丘尼此罪更不應作舉作憶念與自言治毗尼法若比丘尼以天眼清淨見比丘尼犯戒不取自言牽出門外佛言不應如是若於異時亦不應如是令彼伏罪然後與罪不應不伏罪而與罪也自今已去與諸比丘尼結自言治滅諍應如是説自言毗尼是中人現前者受懺者懺悔者是云何自言説罪名説罪種懺悔者是云何治自責汝心生厭離與多人語毗尼法若諸比丘尼諍事現前不能滅者應多求知法比丘尼行舍羅滅以籌多表語自今已去與諸比丘尼結用多人語滅諍法應如是説用多人語云何多人語若用多人説持法持毗尼持摩夷與罪處所毗尼法若諸比丘尼犯罪前後相違佛言聽僧與彼比丘尼作罪處所白四應如是與集僧集已為作舉作舉已為作憶念作憶念已與罪作法如文作已順行七五之行自今已去與諸比丘尼結罪處所滅諍法應如是説結罪處所云何罪處所彼比丘尼此罪應與作舉作憶念者是與草覆地毗尼法若諸比丘尼作念我曹多犯衆戒非沙門法亦作亦説出入無限若我曹還自共善問此事或能令此諍事轉深重經歷年月不得如法如毗尼如佛所教滅除諍事令僧不得安樂佛言應滅此諍猶如草覆地自今已去與諸比丘尼結如草覆地滅諍法應如是説如草覆地云何草覆地此罪更不説罪名罪種懺悔者是諍有四種言諍覓諍犯諍事諍云何言諍比丘尼共比丘尼諍言引十八諍事法非法乃至説不説若以如是相共諍言語遂彼此共鬪是為言諍云何覓諍若比丘尼與比丘尼覓罪以三舉事破戒破見破威儀見聞疑作如是相覓罪共語不妄求伴勢力安慰其意若舉作憶念若安此事若不安此事不癡不脫是為覓諍云何犯諍犯七種罪波羅夷乃至惡説是為犯諍云何事諍言諍中事作覓諍中事作犯諍中事作是為事諍舉藥對諍律文廣明雜行篇第十六結説戒堂法律言不知當於何處説戒佛言聽作説戒堂應一比丘尼具儀唱某大堂閣上堂經行堂若河側若樹下若石側若生草處已應如是作大姊僧聽若僧時到僧忍聽在某處作説戒堂白如是大姊僧聽今衆在某處作説戒堂誰諸大姊忍僧在某處作説戒堂者默然誰不忍者説僧已忍聽在某處作説戒堂竟僧忍默然故是事如是持解説戒堂法若比丘尼先立説戒堂復欲餘處立聽解前説戒堂然後更結白二羯磨應如是解大姊僧聽若僧時到僧忍聽解某處説戒堂白如是大姊僧聽今僧解某處説戒堂誰諸大姊忍僧解某處説戒堂者默然誰不忍者説僧已忍解某處説戒堂竟僧忍默然故是事如是持結庫藏法若安物處不堅牢佛聽於別房結作庫藏屋白二羯磨應唱房若溫室若重屋若經行處應一比丘尼具儀僧中唱某房作庫藏屋唱已應如是作大姊僧聽若僧時到僧忍聽僧結某甲房作庫藏屋白如是大姊僧聽僧結某甲房作庫藏屋誰諸大姊忍僧結某甲房作庫藏屋者默然誰不忍者説僧已忍結某甲房作庫藏屋竟僧忍默然故是事如是