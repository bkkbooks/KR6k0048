令境內人民亦得安樂生業自恣無諸憂苦多得利益無有損減如是如法比丘得力非法比丘無力非法比丘來至如法比丘所隨順教令不敢違逆若當逃竄不作衆惡爾時如法比丘安隱得樂若在僧中得語若在空處住作如法羯磨不作非法羯磨作毗尼羯磨不作非毗尼羯磨是法便行非法不行勤修精進未得能得未入能入未證能證則令諸天人民得大利益佛説如是諸比丘聞歡喜信樂受持爾時舍利弗告諸比丘諸長老若有鬪諍舉他比丘及有罪比丘不自觀察當知此諍遂更增長不得如法如毗尼除滅諸比丘不安樂若比丘共諍舉他比丘及有罪者各自觀過當知此諍不復增長深重得如法如毗尼除滅諸比丘便得安樂住諸比丘云何自觀過有罪比丘作是念我犯如是事彼見我犯非我若不犯者彼不得見我犯非以我犯故令彼見我我今應自悔過令彼不復以惡語呵我我若如是使善法增長是為比丘能自觀其過云何舉他比丘自觀其過彼作如是念彼比丘犯非令我得見若彼不犯非者我則不見以彼犯非故令我得見若彼自能至誠懺悔者不令我出惡言如是令善法增長是為舉他比丘自觀其過若比丘有諍事舉他比丘有罪比丘能作如是自觀其過當知此過不復增長如法如毗尼如佛所教諸比丘得安樂住舍利弗説如是諸比丘聞歡喜信樂受持爾時有衆多比丘往世尊所頭面禮足却坐一面白世尊言大德是法之主説言學云何為學佛告諸比丘學於戒故言學云何學戒增戒學增心學增慧學是故言學彼增戒學增心學增慧學時得調伏貪欲瞋恚愚癡盡彼得貪欲瞋恚愚癡盡已不造不善不近諸惡是故言學佛説如是諸比丘聞歡喜信樂受持爾時佛問諸比丘汝云何學云何為學諸比丘白佛言大德是法之根本為法之主如世尊向所説我等受持故言學復有三學增戒學增心學增慧學學此三學得須陀洹斯陀含阿那含阿羅漢果是故當勤精進學此三學爾時阿難在波羅梨子城雞園中時有孔雀冠婆羅門至阿難所問訊已在一面坐白阿難言沙門瞿曇何故為諸比丘制增戒學增淨行學增波羅提木叉學阿難答言所以爾者為調伏貪欲瞋恚愚癡令盡故世尊為諸比丘制戒復問言若比丘得阿羅漢漏盡彼何所學阿難答言貪欲瞋恚愚癡盡不造不善不近諸惡所作已辦名為無學婆羅門言如向所説便為無學耶阿難答言如是孔雀冠婆羅門聞已歡喜信樂受持佛告迦葉比丘言若上座既不學戒亦不讚歎戒若有餘比丘樂學戒讚歎戒者亦復不能以時勸勉讚歎迦葉比丘我不讚歎如是上座何以故若我讚歎者令諸比丘親近若有親近者令餘人習學其法若有習學其法長夜受苦是故迦葉比丘我見如是上座過失故不讚歎若中座下座亦如是次有上中下座如法反上句是爾時佛告諸比丘譬如有驢與群牛共行自言我亦是牛我亦是牛而驢毛不似牛腳不似牛音聲亦不似牛而與牛共行自言是牛如是有癡人隨逐如法比丘自言是比丘此癡人無有增戒增心增慧如善比丘與衆僧共行自言我是比丘是故汝等當勤修習增戒增心增慧學佛説如是諸比丘聞歡喜信樂受持爾時佛告諸比丘有三學增戒學增心學增慧學何等增戒學若比丘尊重於戒以戒為主不重於定不以定為主不重於慧不以慧為主彼於此戒若犯輕者懺悔何以故此中非如破器破石故若是重戒便應堅持善住於戒應親近行不毀闕行不染污行常如是修習彼斷下五使於上涅槃不復還此若比丘重於戒以戒為主重於定以定為主不重於慧不以慧為主如上若比丘重於戒以戒為主重於定以定為主重於慧以慧為主彼漏盡得無漏心解脫慧解脫於現在前自知得證我生已盡梵行已立所作已辦不復還此滿足行者具滿成就不滿足行者得不滿足成就我説此戒無有唐捐佛説如是諸比丘聞歡喜信樂受持復有三學增戒增心增慧學何等增戒學若有比丘具滿戒行少行定行少行慧行彼斷下五使便於上涅槃不復還此若不能至如是處能薄三結貪欲瞋恚癡得斯陀含來生世間便盡苦際若不能至如是處能斷三結得須陀洹不墮惡趣決定取道七生天上七生人中便盡苦際若比丘具滿戒行具滿定行少行慧行亦如上若比丘具滿戒行具滿定行具滿慧行亦如上復有三學增戒學增心學增慧學何等增戒學若比丘具足持波羅提木叉戒成就威儀畏慎輕戒重若金剛等學諸戒是為增戒學何等增心學若比丘能捨欲惡乃至得入第四禪是為增心學何等增慧學若比丘如實知苦諦知集盡道是為增慧學慶聞修奉等同前爾時世尊在婆闍國地城中告諸比丘我説四種廣説汝等善聽當為汝説諸比丘言大德願樂聞之何等四若比丘如是語諸長老我於某村某城親從佛聞受持此是法是毗尼是佛教若聞彼比丘説不應便生嫌疑亦不應呵應審定文句已應尋究修多羅毗尼檢校法律若聽彼比丘説尋究修多羅毗尼檢校法律時若不與修多羅毗尼法律相應違背於法應語彼比丘汝所説者非佛所説或是長老不審得佛語何以故我尋究修多羅毗尼法律不與修多羅毗尼法律相應違背於法長老不須誦習亦莫教餘比丘今應捨棄若聞彼比丘説尋究修多羅毗尼法律時若與修多羅毗尼法律相應應語彼比丘言長老所説是佛所説審得佛語何以故我尋究修多羅毗尼法律與共相應而不違背長老應善持誦習教餘比丘勿令忘失此是初廣説復次若比丘如是語長老我於某村某城和合僧中上坐前聞此是法是毗尼是佛所教聞彼比丘説時不應嫌疑亦不應呵應審定文句尋究修多羅毗尼檢校法律若聞彼比丘説尋究修多羅毗尼法律時不與相應違背於法應語彼比丘言長老此非佛所説是彼衆僧及上座不審得佛語長老亦爾何以故我尋究修多羅毗尼法律不與相應違背於法長老不須誦習亦莫教餘比丘今當棄之若聞彼比丘語尋究修多羅毗尼法律而與相應不違背於法應語彼比丘言長老是佛所説彼衆僧上座及長老亦審得佛語何以故我尋究修多羅毗尼法律而與相應無有違背長老應善持誦習亦教餘人勿令忘失此是第二廣説次第三句從知法毗尼摩夷衆多比丘所聞亦如是第四句從知法毗尼摩夷一比丘所聞亦如是是為四廣説佛説如是諸比丘聞歡喜信樂受持毗尼有五事答一序二制三重制四修多羅五隨順修多羅有五法名為持律知犯知不犯知輕知重廣誦二部戒復有五法四法同前第五廣誦毗尼復有五法四法同前第五住毗尼而不動復有五法四法同前第五諍事起善能除滅有五種持律誦戒序四事十三事二不定廣誦三十事是初持律若廣誦九十事是第二持律若廣誦戒毗尼是第三持律若廣誦二部戒毗尼是第四持律若都誦毗尼是第五持律是中春秋冬應依上四種持律若不依住突吉羅夏安居應依第五持律若不依住者波逸提持律人有五功德戒品堅牢善勝諸怨於衆中決斷無畏若有疑悔能開解善持毗尼令正法久住復次有五種犯波羅夷僧伽婆尸沙波逸提波羅提提舍尼突吉羅亦名五種制戒亦名五犯聚若不知不見五犯者我説此人愚癡波羅夷乃至突吉羅復次死人有五不好一不淨二臭三有恐畏四令人恐畏惡鬼得便五惡獸非人所住處犯戒人有五過失有身口意業不淨如彼死尸不淨我説此人亦復如是或有身口意業不淨惡聲流布如彼死尸臭氣從出我説此人亦復如是有身口意業不淨諸善比丘畏避如彼死尸令人恐怖我説此人亦復如是有身口意業不淨令諸善比丘見之生惡心言我云何乃見如是惡人如人見死尸生恐畏令惡鬼得便我説此人亦復如是有身口意業不淨者與不善人共住如彼死尸處惡獸非人共住我説此人亦復如是是為犯戒人五事過失如彼死尸破戒有五過失自害為智者所呵有惡名流布臨終時生悔恨死墮惡道持戒有五功德反上句是復有五事先未得物不能得既得不護若隨所在衆若剎利衆婆羅門衆若居士衆若比丘衆於中聞有愧恥無數由旬內沙門婆羅門稱説其惡破戒惡人死墮惡道持戒有五功德反上句是有五種淨果火淨刀淨瘡淨鳥淨不任種淨復有五淨若剝少皮若都剝若腐爛若破若瘀有五法令正法疾滅何等五有比丘不諦受誦喜忘誤文不具足以教餘人文既不具其義有闕是為第一疾滅正法復次有比丘為僧中勝人上座若一國所宗而多不持戒但修諸不善法放捨戒行不勤精進未得而得未入而入未證而證後生年少比丘倣習其行亦多破戒修不善法放捨戒行亦不勤精進未得而得未入而入未證而證是為第二疾滅正法復次有比丘多聞持法持律持摩夷不以所誦教餘比丘比丘尼優婆塞優婆私便命終彼既命終令法斷滅是為第三疾滅正法復次有比丘難可教授不受善言不能忍辱餘善比丘即便捨置是為第四疾滅正法復次有比丘喜鬪諍共相罵詈彼此諍言口如刀劍互求長短是為第五疾滅正法復有五法令正法久住反上句是爾時有異比丘往佛所白言大德以何因緣正法疾滅而不久住佛告比丘若比丘在法律中出家不至心為人説法亦不至心聽法憶持設復堅持不能思惟義趣彼不知義不能如説修行不能自利亦不利人佛告比丘有是因緣令法疾滅而不久住大德復以何因緣令法久住反上句是爾時佛告諸比丘比丘至僧中先有五法應以慈心應自卑下如拭塵巾應善知坐起若見上坐不應安坐若見下座不應起立彼至僧中不為雜説論世俗事若自説法若請人説法若見僧中有不可事心不安忍應作默然何以故恐僧別異故比丘應先有此五法然後至僧中爾時世尊在瞻婆城伽伽池邊白月十五日説戒時於露地坐與衆僧俱前後圍繞時有比丘舉彼比丘見聞疑罪當舉罪時彼比丘乃作餘語答便起瞋恚佛告諸比丘應審定問彼人彼人於佛法中無所堪任無所增長譬如農夫田苗稊稗參生苗葉相類不別而為妨害乃至秀實方知非穀之異既知非穀即耘除根本何以故恐害善苗故比丘亦復如是有惡比丘行來坐起攝持衣鉢如善比丘不別乃至不出罪時既出其罪方知比丘中稊稗之異既知其異應和合為作滅擯除之何以故恐妨善比丘故譬如農夫治穀當風篩揚好穀留聚其下秕𦮽隨風除之何以故恐污好穀故如是惡比丘行來入出如善比丘不別乃至不出罪時既出其罪方知比丘中秕𦮽穢惡既知已應和合為作滅擯除之譬如有人須木作井欄從城中出手捉利斧往彼林中遍扣諸樹若是實中者其聲貞實若是空中者其聲虛而㽄而彼空樹根莖枝葉如貞實者不異至於扣時方知內空既知內空即便斬伐截落枝葉先去麁朴然後釿剗細治內外俱淨以作井欄如是惡比丘行來出入攝持衣鉢威儀如善比丘不異乃至不出罪時既出其罪方知沙門中垢穢稊稗空樹若知已即應和合作滅擯何以故恐妨害善比丘故而説偈言同住知性行嫉妬喜瞋恚人中説善語屏處造非法方便作妄語明者能覺知稊稗應除棄及以空中樹自説是沙門虛妄應滅擯已作滅擯竟行惡非法者清淨者共住當知是光顯和合共滅擯和合盡苦際佛説如是諸比丘聞歡喜信樂受持
