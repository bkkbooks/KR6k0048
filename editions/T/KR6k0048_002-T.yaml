body:
  text: 西太原寺沙門懷素集攝物篇第十攝時現前施法律言自今已去不應於一切時春夏冬求索夏衣又不應此處安居餘處受夏衣分又有在異住處結夏安居已復於餘處住彼不知何處取安居物佛言聽住日多處取若二處俱等聽各取半又云眾僧得夏安居衣僧破為二部佛言應數人多少分若未得夏衣若得夏衣僧破二部亦數人分此等為施現前分並無法爾攝非時現前施法有得施衣不知云何佛言聽分當數人多少分若十人為十分乃至百人為百分好惡相參分不應自取分使異人取不應自擲籌使不見者擲籌此既數人亦無分法攝時僧施法若諸居士施安居物不簡異處隨施應分於得物處有安居勞縱身不在開屬授取律言若一比丘安居大得僧夏安居衣物彼比丘應作心念言此是我物其羯磨對首法准同非時僧施更無異故不出攝非時僧施差分物人法若有住處現前僧得可分衣物律言聽分分時有客數來分衣疲極應差一人令分此人應具五法五法如上應如是作大姊僧聽若僧時到僧忍聽僧差某甲比丘尼為僧作分物人白如是大姊僧聽僧差某甲比丘尼為僧作分物人誰諸大姊忍僧差某甲比丘尼為僧作分物人者默然誰不忍者說僧已忍差某甲比丘尼為僧作分物人竟僧忍默然故是事如是持為僧分粥分小食佉闍尼差請會敷臥具分臥具分浴衣可與可取差比丘尼等使一切亦如是有五法為僧分粥入地獄如箭射謂有愛等有五法分粥生天如箭射謂不愛等乃至差沙彌尼使亦如是付分衣人物法既差人已應須付物作如是付大姊僧聽此住處若衣若非衣現前僧應分若僧時到僧忍聽僧今與某甲比丘尼彼當與僧白如是大姊僧聽此住處若衣若非衣現前僧應分僧今與某甲比丘尼彼當與僧誰諸大姊忍此住處若衣若非衣現前僧應分僧與某甲比丘尼彼當與僧者默然誰不忍者說僧已忍與某甲比丘尼彼當與僧竟僧忍默然故是事如是持作此法已准人等分式叉摩那及沙彌尼若和合等分若不和合二分與一又若不和三分與一又若不與不應分僧伽藍人四分與一若不與不應分四人直攝物法若但四人不成差付直作攝法應如是作大姊僧聽此住處若衣若非衣現前僧應分若僧時到僧忍聽今現前僧分是衣物白如是大姊僧聽此住處若衣若非衣現前僧應分今現前僧分是衣物誰諸大姊忍此住處若衣若非衣現前僧應分今現前僧分是衣物者默然誰不忍者說僧已忍今現前僧分是衣物竟僧忍默然故是事如是持作羯磨已分法如前對首攝物法若有三人彼此共三語受應作是言二大姊憶念此住處若衣若非衣現前僧應分此處無僧此是我等分三說二人亦爾分法如前心念攝物法若有一人應心念言此住處若衣若非衣現前僧應分此處無僧此是我分三說分法如前攝二部僧得施法爾時有異住處二部僧多得可分衣物時比丘僧多比丘尼僧少佛言應分作二分若無比丘尼純式叉摩那亦分二分及純沙彌尼亦分二分若無沙彌尼僧應分若比丘少比丘尼多亦分二分若無比丘純有沙彌亦分二分若無沙彌比丘尼應分分二分已各至本處作羯磨等三法分之時僧得施亦爾其二部現前施並數人分攝亡比丘尼物法律言分僧園田果樹又分別房及屬別房物又分銅瓶銅盆釜鑊及諸重物又分繩床木床坐蓐臥蓐枕又分伊梨延陀耄羅耄耄羅𣰽毺又分車輿守僧伽藍人又分水瓶澡鑵錫杖扇又分鐵作器木作器陶作器皮作器竹作器佛言不應分屬四方僧𣰽毺廣三肘長五肘毛長三指剃刀衣鉢坐具針筒盛衣貯器俱夜羅器現前僧應分先作此簡然後作法看病人對僧捨物法時看病人持物僧中具儀捨云大姊僧聽某甲比丘尼此若餘處亡云彼住處命過所有衣鉢坐具針筒盛衣貯器此隨現有六物作法若有闕者應除又若物類眾多此言攝不盡者應言若衣非衣此住處現前僧應分三說賞看病人物法律言僧問瞻病人言病人有囑授不誰負病者物病者負誰物有五法應與看病人物一知病人可食不可食可食能與二不惡賤病人大小便唾吐三有慈愍心不為衣食四能經理湯藥乃至差若死五能為病人說法令病者歡喜已自於善法增益有是五法應取病人衣物其鉢等物隨現有者賞無者不得將餘物替應如是賞大姊僧聽某甲比丘尼命過所有衣鉢坐具針筒盛衣貯器此現前僧應分若僧時到僧忍聽僧今與某甲看病比丘尼白如是大姊僧聽某甲比丘尼命過所有衣鉢坐具針筒盛衣貯器此現前僧應分僧今與某甲看病比丘尼誰諸大姊忍僧與某甲看病比丘尼衣鉢坐具針筒盛衣貯器者默然誰不忍者說僧已忍與某甲看病比丘尼衣鉢坐具針筒盛衣貯器竟僧忍默然故是事如是持差分衣人法具德如前應如是差大姊僧聽若僧時到僧忍聽僧差某甲比丘尼為僧作分物人白如是大姊僧聽僧差某甲比丘尼為僧作分物人誰諸大姊忍僧差某甲比丘尼為僧作分物人者默然誰不忍者說僧已忍差某甲比丘尼為僧作分物人竟僧忍默然故是事如是持付分衣人物法差已應如是付大姊僧聽某甲比丘尼命過所有若衣非衣此現前僧應分若僧時到僧忍聽僧今與某甲比丘尼某甲比丘尼當還與僧白如是大姊僧聽某甲比丘尼命過所有若衣非衣此現前僧應分僧今與某甲比丘尼某甲比丘尼當還與僧誰諸大姊忍某甲比丘尼命過所有若衣非衣此現前僧應分僧今與某甲比丘尼某甲比丘尼當還與僧者默然誰不忍者說僧已忍與某甲比丘尼某甲比丘尼當還與僧竟僧忍默然故是事如是持分法如前四人直攝物法以不成差付直分云大姊僧聽某甲比丘尼命過所有若衣非衣此現前僧應分若僧時到僧忍聽今現前僧分是衣物白如是大姊僧聽某甲比丘尼命過所有若衣非衣此現前僧應分今現前僧分是衣物誰諸大姊忍某甲比丘尼命過所有若衣非衣此現前僧應分今現前僧分是衣物者默然誰不忍者說僧已忍今現前僧分是衣物竟僧忍默然故是事如是持作羯磨已分法如前有看病者應口和賞對首攝物法若有三人彼此共三語受作如是言二大姊憶念某甲比丘尼命過所有若衣非衣此現前僧應分此處無僧此是我等分三說二人亦爾分法如前有看病人亦口和賞心念攝物法若有一人應心念言某甲比丘尼命過所有若衣非衣此現前僧應分此處無僧此是我分三說分法如前無住處攝物法若有比丘尼遊行到無住處村到已命過不知誰應分此衣鉢白佛佛言彼處若有信樂優婆塞若守園人彼應掌錄若有五眾出家人前來者應與若無來者應送與近處僧伽藍德衣篇第十一受功德衣白法律言若得新衣若檀越施衣若糞掃衣若是新衣若是故衣新物帖作淨若已浣浣已納作淨不以邪命得不以相得不激發得不經宿得不捨墮作淨即日來應法四周安緣五條作十隔若過是者亦應受應自浣染舒張輾治裁作十隔縫治應在眾僧前受如是白大姊僧聽今日眾僧受功德衣若僧時到僧忍聽眾僧和合受功德衣白如是差持功德衣人法律言應問誰能持功德衣若言能者白二差持應如是作大姊僧聽若僧時到僧忍聽僧差某甲比丘尼為僧持功德衣白如是大姊僧聽僧差某甲比丘尼為僧持功德衣誰諸大姊忍僧差某甲比丘尼為僧持功德衣者默然誰不忍者說僧已忍差某甲比丘尼為僧持功德衣竟僧忍默然故是事如是持付功德衣與持衣人法差已作白二付應如是作大姊僧聽此住處僧得可分衣物現前僧應分若僧時到僧忍聽僧今持此衣與某甲比丘尼此比丘尼當持此衣為僧受作功德衣於此住處持白如是大姊僧聽此住處僧得可分衣物現前僧應分僧今持此衣與某甲比丘尼此比丘尼當持此衣為僧受作功德衣於此住處持誰諸大姊忍僧持此衣與某甲比丘尼受作功德衣者默然誰不忍者說僧已忍與某甲比丘尼衣竟僧忍默然故是事如是持持衣僧前受法持衣比丘尼應起捉衣隨諸比丘尼手得及衣言相了處作如是言此衣眾僧當受作功德衣此衣眾僧今受作功德衣此衣眾僧已受作功德衣竟三說諸比丘尼應如是言其受者已善受此中所有功德名稱屬我持衣人應答言爾如是次第乃至下座受已得作五事一得畜長衣二得離衣宿三得別眾食四得展轉食五得不囑比丘尼入聚落也差人作功德衣法律言若得未成衣僧應白二差人作應如是差大姊僧聽若僧時到僧忍聽僧差某甲比丘尼為僧作功德衣白如是大姊僧聽僧差某甲比丘尼為僧作功德衣誰諸大姊忍僧差某甲比丘尼為僧作功德衣者默然誰不忍者說僧已忍差某甲比丘尼為僧作功德衣竟僧忍默然故是事如是持作法如前出功德衣法若不出功德衣作如是意以久得五事放捨佛言不應作如是意聽冬四月竟僧應出功德衣應如是作也大姊僧聽今日眾僧出功德衣若僧時到僧忍聽僧今和合出功德衣白如是若不出衣過功德衣分齊突吉羅有八因緣捨功德衣一去二竟三不竟四失五斷望六聞七出界八共出復有二種捨功德衣持功德衣比丘尼出界外宿眾僧和合共出爾除罪篇第十二除波羅夷罪法案律懺悔有五種或有犯自心念懺悔或有犯小罪從他懺悔或有犯中罪亦從他懺悔或有犯重罪從他懺悔或有犯罪不可懺悔此不可懺罪謂波羅夷罪犯波羅夷罪得法有三一犯覆藏者與滅擯羯磨二犯不覆藏者與盡形學悔羯磨三學悔人重犯者與滅擯羯磨也與覆藏者作滅擯法若犯波羅夷覆藏者僧與作舉作憶念與罪已應如是作大姊僧聽此某甲比丘尼犯某波羅夷罪若僧時到僧忍聽僧今與某甲比丘尼某波羅夷罪滅擯羯磨不得共住不得共事白如是大姊僧聽此某甲比丘尼犯某波羅夷罪僧今與某甲比丘尼某波羅夷罪滅擯羯磨不得共住不得共事誰諸大姊忍僧與某甲比丘尼某波羅夷罪滅擯羯磨不得共住不得共事者默然誰不忍者說三說僧已忍與某甲比丘尼某波羅夷罪滅擯羯磨不得共住不得共事竟僧忍默然故是事如是持與不覆藏者作盡形學悔法律言若未犯波羅夷終不犯若已犯都無覆藏心如法懺者聽僧與彼波羅夷戒羯磨彼比丘尼應僧中具儀作如是乞大姊僧聽我某甲比丘尼犯某波羅夷罪都無覆藏心今從僧乞波羅夷戒願僧與我某甲比丘尼波羅夷戒慈愍故三說僧應如是與法大姊僧聽此某甲比丘尼犯某波羅夷罪無覆藏心今從僧乞波羅夷戒若僧時到僧忍聽僧今與某甲比丘尼波羅夷戒白如是大姊僧聽此某甲比丘尼犯某波羅夷罪無覆藏心今從僧乞波羅夷戒僧今與某甲比丘尼波羅夷戒誰諸大姊忍僧與某甲比丘尼波羅夷戒者默然誰不忍者說三說僧已忍與某甲比丘尼波羅夷戒竟僧忍默然故是事如是持得波羅夷戒已當須盡形壽事事隨順行之隨順行法者不得授人具足戒不得與人依止不得畜沙彌尼若差為比丘尼僧請教誡不得受設差不應往不應為僧說戒不應在僧中問答毘尼不應受僧差使作知事人不應受僧差別處斷事不應受僧差使命不應早入聚落逼暮還當親近比丘尼不得親近外道白衣當順從比丘尼法不得說餘俗語不得眾中誦律若無能誦者聽不得更犯此罪餘亦不應犯若相似若從此生若重於此者不得非僧羯磨及作羯磨者不得受清淨比丘尼敷坐具洗足水拭革𭕫揩摩身及禮拜迎送問訊不應受清淨比丘尼捉衣鉢不得舉清淨比丘尼為作憶念作自言治不應證正人事不得遮清淨比丘尼說戒自恣不得與清淨比丘尼共諍與波羅夷戒比丘尼僧說戒及羯磨時來與不來眾僧無犯與學悔