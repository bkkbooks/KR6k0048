十二位三罪懺時並須緣知具闕准文正解懺開三位第一同懺二十四覆罪謂本長提乃至第十二著用捨墮衣下覆及隨覆二突吉羅以此諸罪種類同故第二同懺不應說戒等七位突吉羅罪亦以此七種類同故第三同懺長等五位波逸提罪懺二十四覆藏罪法行此懺法應須具儀至誠懇惻殷重慚愧永斷相續請乞證明泛爾輕浮罪必不滅應如是作我某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯爾許眾多尼薩耆波逸提罪既犯此罪僧說戒時告清淨犯爾許眾多波逸提罪對首說戒自言清淨犯爾許眾多波逸提罪僧自恣時告清淨犯爾許眾多波逸提罪對首自恣自言清淨犯爾許眾多波逸提罪自身有罪為眾說戒犯爾許眾多突吉羅罪自身有罪不合聞戒犯爾許眾多突吉羅罪僧說戒時二處三問犯爾許眾多默妄突吉羅罪心念說戒自言清淨犯爾許眾多突吉羅罪心念自恣自言清淨犯爾許眾多突吉羅罪自身有罪受他懺悔犯爾許眾多突吉羅罪著用犯捨墮衣犯爾許眾多突吉羅罪此等諸罪並悉識知故不發露經宿犯覆藏突吉羅罪不憶數知數者言知數經第二宿已去復犯隨展轉覆藏突吉羅罪不憶數知數言知我今懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏我今自責心生厭離一說雖言責心言陳須具懺不應說戒等七位突吉羅罪具儀懇惻請證如前應如是作我某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯爾許眾多尼薩耆波逸提罪既犯此罪為眾說戒犯爾許眾多突吉羅罪自身有罪不合聞戒犯爾許眾多突吉羅罪僧說戒時二處三問犯爾許眾多默妄突吉羅罪心念說戒自言清淨犯爾許眾多突吉羅罪心念自恣自言清淨犯爾許眾多突吉羅罪自身有罪受他懺悔犯爾許眾多突吉羅罪著用犯捨墮衣犯爾許眾多突吉羅罪我今懺悔等同前懺長等五位波逸提罪至誠應如是作大姊一心念我某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯捨墮此衣已捨與僧是中有爾許眾多波逸提罪既犯此罪僧說戒時告清淨犯爾許眾多波逸提罪對首說戒自言清淨犯爾許眾多波逸提罪僧自恣時告清淨犯爾許眾多波逸提罪對首自恣自言清淨犯爾許眾多波逸提罪今向大姊懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏願大姊憶我清淨戒身具足清淨布薩三說受懺者應語言自責汝心應生厭離懺者答言爾若捨墮物已用壞盡雖無財捨罪位同前亦須一一緣知具闕如上懺之還衣即座轉付法若眾僧多難集此比丘尼若因緣事欲遠行應問言汝此衣與誰隨彼說便與應如是作大姊僧聽某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯捨墮今捨與僧若僧時到僧忍聽僧持此衣與彼某甲比丘尼彼某甲比丘尼當還此某甲比丘尼白如是大姊僧聽某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯捨墮今捨與僧僧持此衣與彼某甲比丘尼彼某甲比丘尼當還此某甲比丘尼誰諸大姊忍僧持此衣與彼某甲比丘尼彼某甲比丘尼當還此某甲比丘尼者默然誰不忍者說僧已忍與彼某甲比丘尼衣竟僧忍默然故是事如是持一月衣急施衣過後畜鉢藥十六枚皆同唯稱事別為異經宿直還法若無上緣要經宿已羯磨還主一月衣等亦同除此餘者即坐直還二還法同應如是作大姊僧聽某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯捨墮此衣已捨與僧若僧時到僧忍聽僧持此衣還某甲比丘尼白如是大姊僧聽某甲比丘尼故畜爾許眾多長衣餘隨種別稱之過十日犯捨墮此衣已捨與僧僧持此衣還某甲比丘尼誰諸大姊忍僧持此衣還某甲比丘尼者默然誰不忍者說僧已忍還某甲比丘尼衣竟僧忍默然故是事如是持不還物法於僧中捨竟不還者突吉羅若作淨施若遣與人若持作三衣若作波利迦羅衣若故壞若燒若作非衣若數數著盡突吉羅對三比丘尼捨墮法應往三比丘尼所具儀作如是捨云諸大姊憶念我某甲比丘尼故畜等餘詞同上唯不得稱僧為異於中請一清淨比丘尼為懺悔主請詞如前其懺悔主既受請已未得即許應改單白為問邊人應問彼二比丘尼云若二大姊聽我受某甲比丘尼懺者我當受彼二比丘尼應答言可爾受懺悔主得許可已方始答懺者云爾正懺詞等同上還衣問和同上不還結罪同上若對二尼及一捨懺一一同此更無有異對一尼中除問邊人捨乞鉢法是中捨者要須對僧又此住處非餘住處捨及懺悔詞並同前還鉢法此比丘尼鉢若貴價好者留置取最下不如者與之白二羯磨應如是與大姊僧聽此某甲比丘尼鉢破減五綴不漏更求新鉢犯捨墮今捨與僧若僧時到僧忍聽僧今與此某甲比丘尼鉢白如是大姊僧聽此某甲比丘尼鉢破減五綴不漏更求新鉢犯捨墮今捨與僧僧今與此某甲比丘尼鉢誰諸大姊忍僧與某甲比丘尼鉢者默然誰不忍者說僧已忍與此某甲比丘尼鉢竟僧忍默然故是事如是持行鉢白法彼比丘尼鉢應作白問僧作如是白大姊僧聽若僧時到僧忍聽以此鉢次第問上座白如是作此白已當持與上座若上座不取與彼比丘尼彼比丘尼應取不應護眾僧故不取亦不應以此因緣受持最下鉢若受突吉羅若上座取應與上座取上座鉢授與次座若次座取一如上座如是展轉乃至下座爾付鉢令持法若持此比丘尼鉢還此比丘尼若持最下座鉢與與時應作白二羯磨如是與大姊僧聽若僧時到僧忍聽僧今以此最下座鉢若是此比丘尼鉢應云僧今以此比丘尼下鉢與某甲比丘尼受持乃至破白如是大姊僧聽僧今以此若最下座鉢若彼比丘尼下鉢與某甲比丘尼受持乃至破誰諸大姊忍僧與某甲比丘尼鉢者默然誰不忍者說僧已忍與某甲比丘尼鉢竟僧忍默然故是事如是持彼比丘尼守護此鉢不得著瓦石落處不得著倚杖下及著倚刀下不得著懸物下及著道中石上菓樹下不平地不得一手捉兩鉢除指隔中央不得一手捉兩鉢開戶除用心不得著戶閾內戶扇下不得著繩床木床下床間床角頭除暫著不得立盪鉢乃至足令鉢破不應故壞及故令失作非鉢用對俗捨寶法若比丘尼自手捉金銀若錢若教人捉若置地受教彼有信樂守園人若優婆塞語言此物我所不應汝當知之懺對一人作法同上俗還物法若彼人取還與比丘尼者當作彼人物故受教淨人使賞之若得淨衣鉢針筒尼師壇應易受持若優婆塞取已與比丘尼淨衣鉢尼師壇針筒者應取持之俗不還寶法若彼取已不還者令餘尼語言汝應還此比丘尼物若餘比丘尼不語及語不還者當自語言佛教比丘尼作淨故與汝若言與僧與塔與和尚等與諸親舊知識若還本主何以故不欲失彼信施故淨寶法因此便明淨寶儀軌若依此部別開信樂優婆塞及守園人為淨主寶付彼人應語彼言此物我所不應汝當知之或言知是看是或為佛法等事受者受時應作淨語淨語應言知是看是若不語彼人言知是看是者突吉羅若依說一切有部淨施法如錢一切寶物應先求一知法白衣淨人語令解意已復語云我比丘尼法不畜錢寶今以檀越為淨主後得錢寶盡施檀越若淨主死遠出異國應更求淨主然說淨有二種若白衣持錢寶來與比丘尼但言此不淨物我不應畜若淨當受即是淨法若白衣言與比丘尼寶比丘尼語言我不應畜淨人答言易淨物畜即是作淨若白衣不言易淨物畜比丘尼自不說淨直置地去者若有比丘尼應向說淨隨久近畜說詞同上懺一百七十八波逸提罪法欲除本罪還先懺覆品數多少准前應知此對一人許別眾懺請懺悔主如上作法請已應對懺主作是悔言大姊一心念我某甲比丘尼故妄語犯爾許眾多波逸提罪餘隨種名事別稱之今向大姊懺悔不敢覆藏等同上懺波羅提提舍尼罪法覆品如前請懺主已作如是懺大姊一心念我某甲比丘尼無病故乞蘇食犯爾許眾多波羅提提舍尼罪餘隨種名事別稱之大姊我犯可呵法所不應為今向大姊悔過不敢覆藏等同上一說懺突吉羅罪法一切突吉羅無問根本從生故作誤作覆隨覆等品數如前要期永斷作如是懺我某甲比丘尼故不齊整著僧伽梨犯爾許眾多突吉羅罪以故作故復犯爾許眾多非威儀突吉羅罪若誤犯者即無故犯非威儀罪應云我某甲比丘尼誤不齊整著僧伽梨犯爾許眾多突吉羅罪餘隨種名事別稱之我今懺悔不敢覆藏等同上一切僧同犯識罪發露法案律僧集一處欲說戒當說戒時一切眾僧盡犯罪彼各各作是念世尊制戒犯者不得說戒不得聞戒不得向犯者懺悔犯者不得受他懺悔彼比丘尼白已當懺悔作如是白大姊僧聽此一切眾僧犯罪若僧時到僧忍聽此一切僧懺悔白如是作是白已然後說戒一切僧同犯疑罪發露法案律僧集一處欲說戒當說戒時一切僧於罪有疑彼各念言世尊制戒等如前彼一切僧作白已應說其罪當作是白大姊僧聽此一切僧於罪有疑若僧時到僧忍聽此眾僧自說罪白如是作是白已然後說戒別人識罪發露法至一清淨比丘尼所具儀作如是言大姊憶念我某甲比丘尼犯某甲罪若干眾多今向大姊發露後當如法懺悔一說如是已得聞戒別人疑罪發露法還至一淨尼所具儀作如是言大姊憶念我某甲比丘尼於某犯生疑今向大姊自說須後無疑時當如法懺悔一說如是已得聞戒說戒座中識罪心念發露法案律當說戒時犯罪若有人舉若不舉若作憶念不作憶念其人自憶罪而發露當語邊人言我犯某甲罪今向大姊懺悔復作是念設語傍人恐鬧亂眾不成說戒彼比丘尼當心念言我犯某罪須罷座已當如法懺悔作如是已得聽說戒說戒座中疑罪心念發露法緣同於前唯疑為異彼心念言我於某罪生疑須罷座已無疑時當如法懺悔作如是已得聽說戒治人篇第十三與呵責羯磨法案律有二法僧應與作呵責羯磨非法說法法說非法乃至說不說亦如是乃至舉羯磨亦如是復有三事僧應與作呵責羯磨謂破戒破見破威儀乃至舉羯磨亦如是復憙鬪諍共相罵詈口出刀劍互求長短若復餘人鬪諍往彼勸助是故令僧未有諍事便有諍事已有諍事而不除滅聽僧與作呵責白四集僧集僧已為作舉作舉已為作憶念作憶念已與罪與罪已應如是作大姊僧聽此某甲比丘尼憙共鬪諍共相罵詈口出刀劍互求長短彼自共鬪諍已若復有餘比丘尼鬪諍者即復往彼勸言汝等勉力莫不如他汝等多聞智慧財富亦勝多有知識我等當為汝作伴黨令僧未有諍事而有諍事已有諍事而不除滅若僧時到僧忍聽僧為某甲比丘尼作呵責羯磨若後復更鬪諍共相罵詈者眾僧當更增罪治白如是大姊僧聽此某甲比丘尼憙共鬪諍共相罵詈口出刀劍互求長短彼自共鬪諍已若復有餘比丘尼鬪諍者即復往勸彼言汝等勉力莫不如他汝等智慧多聞財富亦勝多有知識我等當為汝作伴黨令僧未有諍事而有諍事已有諍事而不除滅僧為某甲比丘尼作呵責羯磨誰諸大姊忍僧與某甲比丘尼作呵責羯磨若後復更鬪諍共相罵詈者眾僧當更增罪治忍者默然誰不忍者說三說僧已忍為某甲比丘尼作呵責羯磨竟僧忍默然故是事如是持彼得法已修行七五之行此七五行具如上明解呵責羯磨法若眾僧在小食上後食上若說法若布薩被呵責羯磨人正衣服脫革屣於一面住䠒跪合掌白如是言大姊受我懺悔自今已去自責心止不復作律言若隨順眾僧無所違逆求解呵責羯磨聽解作白四羯磨僧應觀察有五法不應為解謂違上七五之行有五法應為解呵責謂不違上七五之行應至僧中具儀作如是乞大姊僧聽我某甲比丘尼僧與作呵責羯磨我今隨順眾僧無所違逆從僧乞解呵責羯磨願僧慈愍故為我解呵責羯磨三說僧應如是與法大姊僧聽某甲比丘尼僧為作呵責羯磨彼比丘尼隨順眾僧無所違逆從僧乞解呵責羯磨若僧時到僧忍聽解某甲比丘尼呵責羯磨白如是大姊僧聽此某甲比丘尼僧為作呵責羯磨彼比丘尼隨順眾僧無所違逆從僧乞解呵責羯磨誰諸大姊忍僧為某甲比丘尼解呵責羯磨者默然誰不忍者說三說僧已忍解某甲比丘尼呵責羯磨竟僧忍默然故是事如是持與擯羯磨法律言行惡行污他家言惡行者謂自種華樹教他種等言污家者有四種事一依家污家二依利養污家三依親友污家四依僧伽藍污家若行惡行污他家見聞皆具聽僧作擯白四此作及解文如律明與依止羯磨法若有比丘尼癡無所知多犯眾罪共白衣雜住而相親附不順佛法聽僧為作依止白四謂遣依止有德人住不得稱方國土等作此作及解亦文如律與遮不至白衣家羯磨法白衣有五法僧應為作遮不至白衣家羯磨此人恭敬父母沙門婆羅門所應持者堅持不捨比丘尼有十法僧應與作遮不至白衣家羯磨惡說罵白衣方便令白衣家損減作無利作無住處鬪亂白衣於白衣前謗佛法僧在白衣前作下賤罵如法許白衣而不實此作及差使送懺悔解等具如律文矣與不見罪舉羯磨法若有比丘尼犯罪餘比丘尼語言汝犯罪見不答言不見佛言聽僧與作不見罪舉白四此作及解亦文如律與不懺悔罪舉羯磨法若有比丘尼犯罪諸比丘尼語言汝有罪懺悔答言不懺悔佛言聽僧與作不懺悔舉白四此作及解亦文如律與不捨惡見舉羯磨法若有比丘尼如是惡見生作如是言我知佛所說法犯婬欲非障道法佛言聽僧為作呵諫白四捨此事故諫法如文彼比丘尼僧與作呵諫已猶故不捨惡見佛言與作不捨惡見舉白四此作及解亦文如律與狂癡羯磨法有三種狂癡一說戒時或憶或不憶或來或不來二或憶而來三或不憶不來是謂三種狂癡是中下二不應與作初一應作白二羯磨應如是與大姊僧聽此某甲比丘尼心亂狂癡或憶說戒或不憶說戒或來或不來若僧時到僧忍聽僧與某甲比丘尼作心亂狂癡羯磨或憶或不憶或來或不來僧作羯磨說戒白如是大姊僧聽此某甲比丘尼心亂狂癡或憶說戒或不憶說戒或來或不來僧與某甲比丘尼作心亂狂癡羯磨或憶或不憶或來或不來作羯磨說戒誰諸大姊忍僧與某甲比丘尼作心亂狂癡或憶或不憶或來或不來作羯磨說戒者默然誰不忍者說僧已忍與某甲比丘尼作心亂狂癡或憶或不憶或來或不來作羯磨竟僧忍默然故是事如是持解狂癡羯磨若狂病止僧作白二法解具儀作如是乞大姊僧聽我某甲比丘尼先得狂癡病說戒時或憶或不憶或來或不來眾僧與我作狂癡病羯磨作已病還得止今從眾僧乞解狂癡羯磨三說僧應如是與法大姊僧聽此某甲比丘尼先得狂癡病彼說戒時或憶或不憶或來或不來眾僧與作狂癡病羯磨與作羯磨已狂癡病還得止今從眾僧乞解狂癡病羯磨若僧時到僧忍聽與解狂癡病羯磨白如是大姊僧聽此某甲比丘尼先得狂癡病彼說戒時或憶或不憶或來或不來眾僧與作狂癡病羯磨與作羯磨已狂癡病還得止今從眾僧乞解狂癡病羯磨誰諸大姊忍僧與某甲比丘尼解狂癡病羯磨者默然誰不忍者說僧已忍與某甲比丘尼解狂癡病羯磨竟僧忍默然故是事如是持佛言隨狂病時與作羯磨狂止還解與學家羯磨法時有居士家夫婦俱得信樂為佛弟子諸佛見諦弟子常法於諸比丘比丘尼無所愛惜乃至身肉若諸比丘比丘尼至家常與飲食及諸供養故令貧窮衣食乏盡佛言聽僧與彼居士作學家羯磨應如是作大姊僧聽於某城中某居士家夫婦得信為佛弟子財物竭盡若僧時到僧忍聽僧今與作學家羯磨諸比丘尼不得在某家受食食白如是大姊僧聽於某城中某居士家夫婦得信為佛弟子財物竭盡僧今與作學家羯磨諸比丘尼不得在某家受食食誰諸大姊忍僧與某居士作學家羯磨者默然誰不忍者說僧已忍與某居士作學家羯磨竟僧忍默然故是事如是持若先受請若有病若置地與若從人受若學家施後財物還多無犯解學家羯磨法若學家財物還多從僧乞解學家羯磨僧應白二解應如是作大姊僧聽於某城中某居士家夫婦得信為佛弟子好施財物竭盡僧先與作學家羯磨今財物還多從僧乞解學家羯磨若僧時到僧忍聽解學家羯磨白如是大姊僧聽於某城中某居士家夫婦得信為佛弟子好施財物竭盡僧先與作學家羯磨今財物還多從僧乞解學家羯磨僧今與某居士解學家羯磨誰諸大姊忍僧與某居士解學家羯磨者默然誰不忍者說僧已忍與某居士解學家羯磨竟僧忍默然故是事如是持作餘語羯磨法若有比丘尼犯罪諸比丘尼問言汝自知犯罪不耶即以餘事報諸比丘尼汝向誰語為說何事為論何理為語我為語誰耶是誰犯罪罪由何生我不見罪云何言我有罪佛言自今已去聽白已當名作餘語應如是白大姊僧聽此某甲比丘尼犯罪諸比丘尼問言汝今自知犯罪不耶此比丘尼即以餘事報諸比丘尼言汝向誰語為說何事為論何理為我說為餘人說誰犯罪罪由何生我不見罪若僧時到僧忍聽當名某甲比丘尼作餘語白如是作是白已名作餘語者若未白前作餘語者一切盡突吉羅若作白已作餘語者一切盡波逸提作觸惱羯磨法若有比丘尼眾僧立制不得作餘語已便觸惱眾僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語佛言聽僧與此比丘尼作單白羯磨名作觸惱作如是白大姊僧聽此某甲比丘尼僧名作餘語已便觸惱眾僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語若僧時到僧忍聽制某甲比丘尼名作觸惱白如是如是白已名作觸惱僧未白前觸惱僧者一切盡突吉羅若作白已觸惱僧者一切盡波逸提惡馬治法若有比丘尼惡性不受諫語多犯眾罪餘比丘尼語言汝犯罪見不答言不見僧應捨棄莫問語如是言汝今不見罪汝所往之處彼亦當舉汝罪為汝作自言不聽汝作阿㝹婆陀不聽布薩自恣如調馬師惡馬難調即合所繫韁杙棄之汝比丘尼不自見罪亦復如是一切捨棄汝所往之處乃至不聽汝布薩自恣是人不應求聽此即是聽梵罰治法若有比丘尼惡性犯戒復不受諫者作默擯治應如是作一切比丘尼默擯不與語是梵罰治然不改者將詣眾中諸人共彈使出莫與說戒亦莫與法會從事不禮比丘法時六群比丘沙彌來至比丘尼住處共六群比丘尼式叉摩那沙彌尼共住更相調弄或共唄或共哭共戲笑亂諸坐禪比丘尼佛聽喚來謫罰若不改者應為彼沙彌和尚阿闍梨作不禮羯磨此作及解文如律明與白衣家作覆鉢羯磨法律言白衣家有五法不應與作覆鉢不孝順父不孝順母不敬沙門不敬婆羅門不供事比丘尼有五法應作即反上是復有十法眾僧應與作覆鉢罵謗比丘尼為比丘尼作損減作無利益方便令無住處鬪亂比丘尼於比丘尼前說佛法僧惡以無根不淨法謗比丘尼若犯比丘尼如是九八七六五四三二一與作覆鉢法應如是與大姊僧聽此某甲某甲比丘尼清淨而以無根波羅夷法謗若僧時到僧忍聽僧今為此某甲作覆鉢不相往來白如是大姊僧聽此某甲某甲比丘尼清淨而以無根波羅夷法謗今僧為作覆鉢不相往來誰諸大姊忍僧為某甲作覆鉢不相往來者默然誰不忍者說僧已忍為某甲作覆鉢不相往來竟僧忍默然故是事如是持差比丘尼使告白衣法律言應白二差一比丘尼為使告彼令知其使比丘尼應具八德八德及差廣如律明此使比丘尼往至彼家不應受床坐飲食供養等具應語云今僧為汝作覆鉢不相往來彼若不解應廣為說彼人若言作何方便解我覆鉢還相往來者彼使應語云汝應往懺悔眾僧彼若懺悔隨順眾僧不敢違逆從僧乞解覆鉢還相往來者僧應為解文如律爾
