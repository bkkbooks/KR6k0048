body:
  text: 西太原寺沙門懷素集原夫鹿苑龍城啓尸羅之妙躅象巖鷲嶺開解脫之玄宗於是三千大千受清涼而出火宅天上天下乘戒筏而越迷津內衆於是敷榮外徒由斯安樂其後韜真細㲲多聞折軸之憂掩正微言罕見浮囊之固即有飲光秀出維絶紐而虛求波離事興振隤網而幽贊慧炬於焉重朗戒海由是再清其律教也弘深固難得而遍舉此羯磨者則紹隆之正術匡護之宏規宗緒歸於五篇濫觴起於四分實菩提之機要誠涅槃之津涉者也素以鋭思弱齡留情斯旨眇觀至教式考義途亟歷炎涼庶無大過誤耳然自古諸德取解不同定僧羯磨總有四本其中與僧同者不別條録其不同者各以類分隋朝願律師總定二部羯磨僧尼各別兩卷流行或有傳人輒分尼法作其三卷復有宋代求那跋摩簡尼別行集成一卷素乃於諸家撰集莫不研尋校理求文抑多乖舛遂以不敏總述尼法分為三卷勒成一部庶無增減以適時機祇取成文非敢穿鑿惟願戒珠增照叶日月而齊明繫草傳芳與天地而同朽後之覽者知斯志焉方便篇第一僧集律言應來者來又言僧有四種四人五人十人二十人四人僧者除受大戒自恣出罪餘一切羯磨應作五人僧者除中國受大戒出罪餘一切羯磨應作十人僧者除出罪餘一切羯磨應作二十人僧者一切羯磨應作況復過二十若隨四位僧中有少一人者作法不成非法非毗尼和合律言同一羯磨和集一處不來者囑授在現前應呵者不呵又言五法應和合若如法應和合若默然任之若與欲若從可信人聞若先在中默然而坐如是五事應和合未受大戒者出律言不應在未受大戒人前作羯磨說戒又言聽除人未受大戒餘者在前作羯磨說戒又言有四滿數有人得滿數不應呵有人不得滿數應呵有人不得滿數亦不應呵有人得滿數亦應呵何等人得滿數不應呵若為作呵責羯磨擯羯磨依止羯磨遮不至白衣家羯磨何等人不得滿數應呵若欲受大戒人何等人不得滿數亦不得呵若為比丘尼作羯磨比丘不得滿數亦不得呵式叉摩那沙彌沙彌尼若言犯邊罪等十三人若被舉若滅擯若應滅擯若別住若在戒場上若神足在空若隱沒若離見聞處若所為作羯磨人何等人得滿數亦得呵若善比丘尼同一界住不以神足在空不隱沒不離見聞處乃至語傍人不來諸比丘尼說欲及清淨唯除結界不得說欲其欲須與清淨合說若自恣時應言與欲自恣若有佛法僧事病患事看病緣聽與欲律言與欲有五種若言與汝欲若言我說欲若言為我說欲若現身相與欲若廣說與欲若不現身相不口說欲者不成與欲應更與餘者欲其持欲人受欲已便命過若餘處行若罷道若入外道衆若入別部衆若至戒場上若明相出若自言犯邊罪等十三人若被舉若滅擯若應滅擯若神足在空若離見聞處不成與欲應更與餘者欲若至中道若至僧中亦如是若廣說欲者應至傳欲人所具儀作如是言大姊一心念我某甲比丘尼如法僧事與欲清淨爾時持欲比丘尼自有事起不及詣僧者聽轉欲與餘人轉時應云大姊一心念我某甲比丘尼與某甲比丘尼受欲清淨彼及我身如法僧事與欲清淨持欲比丘尼至僧說時若能記識姓名者對僧一一稱名說云大姊僧聽某甲比丘尼某甲比丘尼如法僧事與欲清淨若不能記姓名但云衆多若受欲人若睡若入定或忘若不故作如是名為成與欲若故不說者突吉羅僧今何所作為然所為事有其三種一為情事如受懺等二為非情事如結諸界三情非情事如處分離衣等此所為事委僧量宜故須對衆問其所作某羯磨羯磨約體但三謂單白白二白四律言有七種羯磨不應作非法非毗尼羯磨非法別衆羯磨非法和合羯磨法別衆羯磨法相似別衆羯磨法相似和合羯磨呵不止羯磨應作如法如毗尼羯磨白二羯磨如白法作白如羯磨法作羯磨白四亦爾是為如法如毗尼羯磨此方便六遍餘諸法唯除結界闕者不成結界篇第二結大界法律言當敷座當打揵椎盡共集一處不聽受欲是中舊住比丘尼應唱大界四方相若東方有山稱山有塹稱塹若城若疆畔若園若林若池若樹若石若垣牆若神祀舍如東方相餘方亦爾但結界處不得二界相接應留中間亦不得隔駛流水結除常有橋船唱相之法應起禮僧白言大姊僧聽我舊住比丘尼某甲若非舊住識界者唱應除舊住二言為僧唱大界四方相白已應唱謂從東南角等次第而唱乃至三說訖衆中差堪能作羯磨者若上座若次座若誦律若不誦律當如是作大姊僧聽逖徑反此住處比丘尼唱四方大界相若僧時到僧忍聽逖零反僧今於此四方相內結大界同一住處同一說戒白如是大姊僧聽此住處比丘尼唱四方大界相僧今於此四方相內結大界同一住處同一說戒誰諸大姊忍僧於此四方相內結大界同一住處同一說戒者默然誰不忍者說僧已忍於此四方相內同一住處同一說戒結大界竟僧忍默然故是事如是持解大界法諸比丘尼或欲廣作界及狹作者佛聽先解前界然後欲廣狹作從意當作白二羯磨解應如是作大姊僧聽今此住處比丘尼同一住處同一說戒若僧時到僧忍聽解界白如是大姊僧聽此住處比丘尼同一住處同一說戒今解界誰諸大姊忍僧同一住處同一說戒解界者默然誰不忍者說僧已忍聽同一住處同一說戒解界竟僧忍默然故是事如是持結同一說戒同一利養界法若二住處別利養別說戒諸比丘尼欲結共一說戒共一利養界佛聽各自解界然後白二結當敷座等如前應如是作大姊僧聽如所說界相若僧時到僧忍聽今僧於此處彼處結同一說戒同一利養界白如是大姊僧聽如所說界相今僧於此處彼處結同一說戒同一利養界誰諸大姊忍僧於此處彼處同一說戒同一利養結界者默然誰不忍者說僧已忍於此處彼處同一說戒同一利養結界竟僧忍默然故是事如是持結同一說戒別利養界法若二住處別說戒別利養欲得同一說戒別利養先各自解界然後結結法同前唯改一句云同一說戒別利養白如是結別說戒同一利養界法若二住處別說戒別利養諸比丘尼欲得別說戒同一利養欲守護住處故佛聽白二結應如是作大姊僧聽若僧時到僧忍聽今僧於此彼住處結別說戒同一利養為欲守護住處故白如是大姊僧聽今僧於此彼住處結別說戒同一利養為守護住處故誰諸大姊忍僧於此彼住處結別說戒同一利養為守護住處故者默然誰不忍者說僧已忍於此彼住處結別說戒同一利養為守護住處故竟僧忍默然故是事如是持此及前二律無解法若欲解者准結翻解翻相應知結戒場法若有四人或五人十人二十人羯磨事起是中大衆數集疲極佛聽結戒場稱四方小界相若安杙若石若疆畔作齊限是中結者安三重摽相最內一重是戒場相中間一重是大界內相此與戒場相不得相入及並應留中間最外一重是大界外相先唱戒場相結唱法如上應如是作大姊僧聽此住處比丘尼稱四方小界相若僧時到僧忍聽僧今於此四方小界相內結作戒場白如是大姊僧聽此住處比丘尼稱四方小界相僧今於此四方小界相內結戒場誰諸大姊忍僧於此四方相內結戒場者默然誰不忍者說僧已忍於此四方相內結作戒場竟僧忍默然故是事如是持次唱大界內外相唱及結如上解戒場法文略無解若欲解者應翻結云大姊僧聽此住處比丘尼戒場若僧時到僧忍聽解戒場白如是大姊僧聽此住處比丘尼戒場僧今於此解戒場誰諸大姊忍僧於此解戒場者默然誰不忍者說僧已忍於此解戒場竟僧忍默然故是事如是持難結小界授戒法若有欲受戒者至界外有比丘尼往遮佛言若有不同意者未出界聽在界外疾疾一處集結小界應如是作大姊僧聽僧集一處結小界若僧時到僧忍聽結小界白如是大姊僧聽今此僧一處集結小界誰諸大姊忍僧一處集結小界者默然誰不忍者說僧已忍結小界竟僧忍默然故是事如是持解難結小界授戒法彼不應不解界而去應如是解大姊僧聽今衆僧集解界若僧時到僧忍聽解界白如是大姊僧聽今衆僧集解界誰諸大姊忍僧集解界者默然誰不忍者說僧已忍解界竟僧忍默然故是事如是持難結小界說戒法律言若布薩日於無村曠野中行衆僧應和合集在一處共說戒若僧不得和合隨同和尚等當下道各集一處結小界說戒當如是結大姊僧聽今有爾許比丘尼集若僧時到僧忍聽結小界白如是大姊僧聽今有爾許比丘尼集結小界誰諸大姊忍爾許比丘尼集結小界者默然誰不忍者說僧已忍爾許比丘尼集結小界竟僧忍默然故是事如是持解難結小界說戒法彼不應不解界而去應如是解大姊僧聽今有爾許比丘尼集若僧時到僧忍聽解此處小界白如是大姊僧聽今有爾許比丘尼集解此處小界誰諸大姊忍僧解此處小界者默然誰不忍者說僧已忍解此處小界竟僧忍默然故是事如是持難結小界自恣法若有衆多比丘尼於自恣日在非村未結界處道路行若和合得自恣者善若不得和合者隨所同和尚等移異處結小界作自恣應如是作大姊僧聽諸比丘尼坐處已滿齊如是比丘尼坐處若僧時到僧忍聽僧今於此處結小界白如是大姊僧聽齊如是比丘尼坐處僧於此處結小界誰諸大姊忍齊如是比丘尼坐處僧於此處結小界者默然誰不忍者說僧已忍齊如是比丘尼坐處結小界竟僧忍默然故是事如是持解難結小界自恣法彼不應不捨界而去應如是捨大姊僧聽齊如是比丘尼坐處若僧時到僧忍聽僧今解此處小界白如是大姊僧聽齊如是比丘尼坐處僧今解此處小界誰諸大姊忍僧齊如是比丘尼坐處解小界者默然誰不忍者說僧已忍齊如是比丘尼坐處解小界竟僧忍默然故是事如是持結不失衣界法若有比丘尼意欲樂靜自念不得離衣宿聽結不失衣界白二羯磨當如是作大姊僧聽此處同一住處同一說戒若僧時到僧忍聽結不失衣界白如是大姊僧聽此處同一住處同一說戒僧今結不失衣界誰諸大姊忍僧於此處同一住處同一說戒結不失衣界者默然誰不忍者說僧已忍此處同一住處同一說戒結不失衣界竟僧忍默然故是事如是持若界中有村應結除村村外界法結法如上唯加一句云除村村外界白如是解不失衣界法文略無解應翻結云大姊僧聽此處同一住處同一說戒若僧時到僧忍聽解不失衣界白如是大姊僧聽此處同一住處同一說戒僧今解不失衣界誰諸大姊忍僧於此處同一住處同一說戒解不失衣界者默然誰不忍者說僧已忍此處同一住處同一說戒解不失衣界竟僧忍默然故是事如是持有村解法翻亦同此結淨地法若僧伽藍內無作食處佛聽白二結作淨地應唱房若庫若溫室經行處一比丘尼起已具儀僧中唱其院及諸果菜等處作淨地唱已應如是作大姊僧聽若僧時到僧忍聽僧今結某處作淨地白如是大姊僧聽僧今結某處作淨地誰諸大姊忍僧結某處作淨地者默然誰不忍者說僧已忍結某處作淨地竟僧忍默然故是事如是持律言有四種淨地一者檀越若經營人作僧伽藍時處分如是言某處為僧作淨地二者若為僧作僧伽藍未施僧三者若半有籬障若多無籬障若都無若垣牆若塹亦如是四者僧作白二羯磨結解淨地法文略無解應翻結云大姊僧聽若僧時到僧忍聽僧今解某處淨地白如是大姊僧聽僧今解某處淨地誰諸大姊忍僧解某處淨地者默然誰不忍者說僧已忍解某處淨地竟僧忍默然故是事如是持授戒篇第三八不可過授戒法案律時摩訶波闍波提與五百舍夷女人俱詣佛所禮足白言善哉世尊願聽女人於佛法中出家為道佛言且止瞿曇彌莫作是言欲令女人出家為道何以故瞿曇彌若女人於佛法中出家為道令佛法不久爾時摩訶波闍波提聞佛教已前禮佛足繞已而去後於異時摩訶波闍波提復與五百舍夷女人俱共剃髮被袈裟往祇桓精舍在門外立步涉破腳塵土坌身涕泣流淚爾時阿難見已往問為往佛所求請世尊為說八不可過法若能行者即是出家受戒故言阿難今為女人制八盡形壽不可過法若能行者即是受戒何等為八雖百歲比丘尼見新受戒比丘應起迎逆禮拜與敷淨座令坐如此法應尊重恭敬讚歎盡形壽不得過比丘尼不應罵詈比丘呵責不應誹謗言破戒破見破威儀如此法應尊重等如上比丘尼不應為比丘作舉作憶念作自言不應遮他覓罪遮說戒遮自恣比丘尼不應呵比丘比丘應呵比丘尼如此法應尊重等如上式叉摩那學戒已從比丘僧乞受大戒如此法應尊重等如上比丘尼犯僧殘罪應二部僧中行摩那埵如此法應尊重等如上比丘尼半月從僧乞教授如此法應尊重等如上比丘尼不應在無比丘處夏安居此法應尊重等如上比丘尼僧夏安居竟應比丘僧中求三事自恣見聞疑如此法應尊重等如上如是阿難我今說此八不可過法若女人能行者即是受戒譬如人於大水上安橋梁而渡如是阿難我今為女人說此八不可過法若能行者即是受戒爾時阿難聞世尊教已即往摩訶波闍波提所語言女人得在佛法中出家受大戒世尊為女人制八不可過法若能行者即是受戒即為彼說八事如上摩訶波闍波提言若世尊為女人說此八不可過法我及五百舍夷女人當共頂受阿難復還白佛佛言如是阿難摩訶波闍波提及五百女人得受戒又告阿難若女人不於佛法出家者佛法當得久住五百歲阿難聞之不樂心懷悔恨憂惱啼泣流淚前禮佛足繞已而去善來授戒法案律時聞法者即於座上諸塵垢盡得法眼淨見法得法成辦諸法已獲果實前白佛言我今欲於如來所出家修梵行佛言來比丘尼於我法中快自娛樂修梵行盡苦源唱此言已髮自然落袈裟著身鉢盂在手即名出家受具足戒羯磨授戒與度人法律言世尊制戒雖聽度人汝等愚癡輒便度人而不知教授以不知教授故不案威儀乞食不如法處處受不淨食或受不淨鉢食在小食大食上高聲大喚如婆羅門聚會法自今已去聽僧與授具足者白二羯磨往彼僧中具儀作如是求大姊僧聽我某甲比丘尼求衆僧乞度人授具足戒願僧聽我某甲比丘尼度人授具足戒三說僧當觀察此人若不堪能教授及不能與二歲學戒及二法攝者當語言妹止勿度人若有智慧堪能教授與二歲學戒及二法攝取者應如是作大姊僧聽此某甲比丘尼今從衆僧乞授人具足戒若僧時到僧忍聽僧今與某甲比丘尼授人具足戒白如是大姊僧聽此某甲比丘尼今從衆僧乞授人具足戒僧今與某甲比丘尼授人具足戒誰諸大姊忍僧與某甲比丘尼授人具足戒者默然誰不忍者說僧已忍聽某甲比丘尼授人具足戒竟僧忍默然故是事如是持依止闍梨法亦同此度沙彌尼與形同法律言若欲在比丘尼寺內剃髮者當白僧若一一語令知白僧當作是白大姊僧聽此某甲欲從某甲求剃髮若僧時到僧忍聽為某甲剃髮白如是作是白已然後剃髮度沙彌尼與法同請和尚尼法若欲在比丘尼寺內出家者先請和尚尼具儀作如是請大姊一心念我某甲今求阿姨為十戒和尚願阿姨為我作十戒和尚我依阿姨故得受沙彌尼戒慈愍故三說應報可爾請闍梨法具儀作如是請大姊一心念我某甲今求阿姨為十戒阿闍梨願阿姨為我作十戒阿闍梨我依阿姨故得受沙彌尼戒慈愍故三說應報可爾白僧法若不得和合者當語一切僧知若得和合作如是白大姊僧聽此某甲從某甲求出家若僧時到僧忍聽與某甲出家白如是授戒法教著袈裟具儀作如是言我阿姨某甲歸依佛法僧我今隨佛出家和尚尼某甲如來無所著等正覺是我世尊三說我阿姨某甲歸依佛法僧竟我今隨佛出家已和尚尼某甲如來無所著等正覺是我世尊三說授十戒相語云盡形壽不殺生是沙彌尼戒能持不答言能盡形壽不得偷盜是沙彌尼戒能持不答言能盡形壽不得淫是沙彌尼戒能持不答言能盡形壽不得妄語是沙彌尼戒能持不答言能盡形壽不得飲酒是沙彌尼戒能持不答言能盡形壽不得著華鬘香油塗身是沙彌尼戒能持不答言能盡形壽不得歌舞倡伎及往觀聽是沙彌尼戒能持不答言能盡形壽不得高廣大床上坐是沙彌尼戒能持不答言能盡形壽不得非時食是沙彌尼戒能持不答言能盡形壽不得捉持生像金銀寶物是沙彌尼戒能持不答言能此是沙彌尼十戒盡形壽不得犯能持不答言能汝已受戒竟當供養三寶勤修三業坐禪誦經勤作衆事授已教誦十數其十者一一切衆生皆依飲食二名色三三受四四聖諦五五陰六六入七七覺分八八聖道九九衆生居十十一切入度外道法若有外道欲求出家者僧與四月共住白二羯磨當如是與先剃髮已著袈裟乃至合掌教作是言大姊僧聽我某甲外道歸依佛歸依法歸依僧我於世尊所求出家為道世尊即是我如來至真等正覺三說我某甲外道歸依佛法僧已從如來出家學道如來是我至真等正覺三說次與戒相與法同上與四月共住法次應教作是言大姊僧聽我某甲外道從僧乞四月共住願僧慈愍故與我四月共住三說安著眼見耳不聞處僧應作如是法大姊僧聽彼某甲外道今從衆僧乞四月共住若僧時到僧忍聽與彼某甲外道四月共住白如是大姊僧聽彼某甲外道今從衆僧乞四月共住僧今與彼四月共住誰諸大姊忍僧與彼四月共住者默然誰不忍者說僧已忍與彼外道四月共住竟僧忍默然故是事如是持彼行