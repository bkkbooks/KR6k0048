壽能持不答言能若得長利別房尖頭屋小房石室兩房一戶應受依腐爛藥出家受大戒是比丘尼法是中盡形壽能持不答言能若得長利酥油生酥蜜石蜜應受汝已受戒竟白四羯磨如法成就得處所和尚如法阿闍梨如法二部僧具足滿汝當善受教法應勸化作福治塔供養佛法衆僧和尚阿闍梨一切如法教敕不得違逆應學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不絶餘所未知者當問和尚阿闍梨令受戒者在前而去師資篇第四制和尚行法和尚尼看弟子當如女想弟子看和尚尼當如母想展轉相敬重相瞻視如是正法便得久住增益廣大請法如上又言不應年減十二受人具足戒又制和尚尼法應如是行若弟子衆僧欲為作呵責等七羯磨者和尚尼當於中如法料理令僧不與弟子作羯磨若作令如法復次若僧與弟子作呵責等七羯磨和尚尼於中如法料理令弟子順從於僧不違逆求除罪令僧疾與解羯磨復次弟子犯僧殘和尚尼當如法料理若應與摩那埵當與乃至當與出罪復次弟子得病和尚尼當瞻視若令餘人看乃至差若命終弟子若不樂住處當自移若教人移弟子若有疑事當以法以律如佛所教如法除之若惡見生教令捨惡見住善見當以二事將護以法以衣食是中法將護者應教增戒增心增慧教學問誦經是中衣食將護者當與衣食床臥具病瘦醫藥隨力所堪為辦自今已去制和尚尼法如是和尚尼應行若不行如法治制依止阿闍梨行法若有新受戒比丘尼和尚尼命終無人教授以不被教授故乃至如婆羅門聚會法佛言自今已去聽有阿闍梨聽有弟子阿闍梨於弟子當如女想弟子於阿闍梨如母想展轉相教展轉相奉事如是於佛法中倍增益廣流布當作是請具儀言大姊一心念我某甲今求阿姨為依止願阿姨與我依止我依止阿姨住三說彼言可爾或言與汝依止或言汝莫放逸闍梨行法並同和尚制弟子行法時諸弟子不行弟子法不白和尚入村等佛言自今已去當制弟子法使弟子於和尚所行弟子法共行八法如前又不白和尚不得入村不得至他家不得從餘比丘尼或將餘比丘尼為伴不得與不得受不得佐助衆事不得受他佐助衆事不得為他剃髮不得使他剃髮不得入浴室不得為人揩摩身不得至晝日住處房不得至間不得至界外不得行他方彼當清旦入和尚尼房中受誦經法問義當除去小便器應白時到乃至廣說彼當日三問訊和尚尼朝中日暮當為和尚尼執二事勞苦不得辭設一修理房舍二為補浣衣服和尚尼如法所教盡當奉行若遣往方面周旋不得辭設假託因緣若辭設者當如法治自今已去制弟子修行法若不修者當如法治此行於阿闍梨所修亦如是文同故不出呵責弟子法時諸弟子不承事恭敬和尚阿闍梨亦不順弟子法無慚無愧不受教作非威儀不恭敬難與語與惡人為友好往淫男家男子家大童男家黃門家比丘精舍沙彌精舍好往看龜鱉有此等過應作呵責呵責有三現一弟子二出過三呵詞呵詞有五應語言我今呵責汝汝去汝莫入我房汝莫為我作使汝莫至我所不與汝語是謂和尚呵責弟子法阿闍梨呵責弟子亦五詞同唯喚第四句莫至我所云汝莫依止我彼盡形壽呵責佛言不應爾竟安居呵責亦不應爾病者亦不應呵弟子懺悔法彼被呵已不向和尚阿闍梨懺悔佛言被呵責已應向和尚阿闍梨懺悔當如是懺具儀作如是言大姊我今懺悔更不復作若聽懺悔者善若不聽者當更日三時懺早起日中日暮若聽悔者善若不聽者當下意隨順求方便解其所犯若彼下意隨順無有違逆而和尚阿闍梨不受者當如法治弟子離和尚懺謝法和尚有五非法弟子應懺悔而去應語和尚言我如法和尚不知我不如法亦不知若我犯戒捨不教呵若犯亦不知若犯而懺悔亦不知如此懺謝應當軟語若不受者和尚應捨遠去依止闍梨應持衣鉢出界經宿已明日還更依止餘比丘尼住說戒篇第五半月往僧寺請教誡差使比丘尼法世尊有如是教比丘尼每半月應往比丘僧中求教授聽白二羯磨差一比丘尼往應如是差大姊僧聽若僧時到僧忍聽僧差某甲比丘尼為比丘尼僧故半月往比丘僧中求教授白如是大姊僧聽僧差某甲比丘尼為比丘尼僧故半月往比丘僧中求教授誰諸大姊忍僧差某甲比丘尼為比丘尼僧故半月往比丘僧中求教授者默然誰不忍者說僧已忍差某甲比丘尼為比丘尼僧故半月往比丘僧中求教授竟僧忍默然故是事如是持彼獨行無護應差二三比丘尼共去使比丘尼往僧寺囑授法使比丘尼至僧寺不應囑客比丘遠行病者應至一智慧解法比丘所具儀作是言大德憶念某處比丘尼僧和合差我比丘尼某甲禮比丘僧足求索教誡三說彼既囑已明日往問可不若聞衆僧已差教授師此使比丘尼往問教授師去時比丘應期往比丘尼應迎比丘期往不往者突吉羅比丘尼期迎不迎亦爾若比丘尼聞教誡師來當半由旬迎在寺內供給所須辦洗浴具若羹粥種種餅食供養若不者突吉羅若無教授人上座有略教者應頂受已還本寺內鳴椎集比丘尼衆不來者囑授告尼衆云大德僧衆無教誡比丘尼人及無說法者語比丘尼衆勤修莫放逸作此告時尼衆皆合掌言頂戴持若二衆病不和不滿當遣使問訊若不往者突吉羅僧說戒法若於十四十五十六日不知為何日說戒佛言聽上座布薩日唱言大姊僧聽今僧某月某日某時集某處說戒如是唱已說戒時至年少比丘尼先往說戒堂中掃灑敷坐具淨水瓶洗足瓶然燈火具舍羅若年少比丘尼不知者上座應教若上座不教者突吉羅若不隨上座教者突吉羅收亦如是僧集之時比坐當相撿挍知有來不來先白然後說戒白等儀軌具如戒經告清淨法若十四十五十六日舊比丘尼欲說戒有客比丘尼來已說戒竟若少若等應從舊比丘尼重說戒不者如法治若客多者舊比丘尼應求客和合若不得者應出界外說戒若舊比丘尼已說戒竟客比丘尼來欲說戒若少若等應求舊比丘尼和合若不得者應出界外說戒若客比丘尼多應從客比丘尼重說戒不者如法治若日同時不同舊比丘尼集已說序竟客比丘尼來少當告清淨作是告云大姊僧聽我某甲比丘尼清淨作是告已餘者當次第聽若說戒竟舉衆未起若多未起若都已起亦告清淨不者如法治若說序竟客來等多舊比丘尼更為重說不者如法治若說戒竟舉衆未起若多未起若都已起亦為重說若客比丘尼集已說序等舊比丘尼來亦如是略說戒法律言若有八難及餘緣聽略說戒言八難者若王若賊若火若水若病若人若非人若惡蟲餘緣者若有大衆集床座少若衆多病聽略說戒若有大衆集坐上覆蓋不周或天雨若布薩多夜已久或鬪諍事或論阿毗曇毗尼或說法夜久聽一切衆未起明相未出應作羯磨說戒更無方便可得宿受欲清淨略前方便一如廣法量難遠近若說戒序問清淨已難至應言諸大姊是八波羅夷法僧常聞乃至衆學亦爾七滅已下依文廣誦若難緣逼近不及說序者即以此緣應去對首說戒法若有三人各各相向作如是言二大姊憶念今僧十五日說戒我某甲比丘尼清淨三說二人亦爾心念說戒法若有一人應心念言今日衆僧十五日說戒我某甲比丘尼清淨三說增減說戒法若有比丘尼喜鬪罵詈遞相誹謗口出刀劍欲來至此說戒者應作二三種布薩若應十五日說十四日作若應十四日說十三日作若聞今日來即應疾疾布薩若聞已入界應至界外說戒若能如是者善若不能應作白却說戒作如是白大姊僧聽若僧時到僧忍聽僧今不說戒至黑月十五日當說戒白如是若客比丘尼不去應作第二却白應作如是白大姊僧聽若僧時到僧忍聽僧今不說戒至白月十五日當說戒白如是若客比丘尼不去至白月者舊比丘尼應如法強與客比丘尼問答非時和合法若因舉事遂有鬪諍能所不和別部說戒若能懺悔改過從僧乞解解已作白羯磨和合布薩應如是白大姊僧聽彼所因事令僧鬪諍誹謗互求長短令僧破壞令僧別住令僧塵垢彼人僧為舉罪已還為解已滅僧塵垢若僧時到僧忍聽僧作和合布薩白如是作是白已和合布薩非時說戒法若因鬪諍令僧不和合僧別異分為二部若能於中改悔不相舉發此則名為以法和合作如是白大姊僧聽衆僧所因諍事令僧鬪諍而不和合衆僧破壞令僧塵垢令僧別異分為二部彼人自知犯罪事今已改悔除滅僧塵垢若僧時到僧忍聽僧今和合說戒白如是作是白已然後和合說戒安居篇第六對首法諸比丘尼不應一切時春夏冬人間遊行從今已去聽夏三月安居應作是言大姊一心念我某甲比丘尼依某甲僧伽藍若在村內應云某甲聚落若在別房應云某甲房前三月夏安居房舍破修治故三說以比丘尼要依持律比丘安居故須問言汝依誰持律彼應答言依某甲律師復應語言有疑當問彼復答言可爾後三月安居法亦如是安居有二種一前二後若前安居住前三月若後安居住後三月心念法律言從今無所依人心念安居作法同前但除初句及後問答作其三說忘成法若有住處欲安居無所依人白忘不心念不知成不佛言若為安居故來便成安居及界法若往安居處欲安居入界內便明相出彼有疑為成安居不佛言若為安居故來便成安居次入園亦同次一腳入界入園亦如是受日篇第七對首法若有佛法僧事檀越父母等請喚受懺病患看病求同業等緣不及即日還聽受七日去應如是作大姊一心念我某甲比丘尼受七日法出界外為某事故還此中安居白大姊令知三說不應專為飲食故去羯磨法為前緣遠不及七日還佛言聽有如是事受過七日法若十五日一月日白二羯磨應如是作大姊僧聽若僧時到僧忍聽某甲比丘尼受過七日法十五日一月日出界外為某事故還此中安居白如是大姊僧聽某甲比丘尼受過七日法十五日一月日出界外為某事故還此中安居誰諸大姊忍僧聽某甲比丘尼受過七日法十五日一月日出界外為某事故還此中安居者默然誰不忍者說僧已忍某甲比丘尼受過七日法十五日一月日出界外為某事故還此中安居竟僧忍默然故是事如是持自恣篇第八往比丘僧中說自恣差使比丘尼法世尊聽比丘尼夏安居竟往比丘僧中說三事自恣見聞疑聽白二羯磨差一比丘尼往應如是差大姊僧聽若僧時到僧忍聽僧差某甲比丘尼為比丘尼僧故往大僧中說三事自恣見聞疑白如是大姊僧聽僧差某甲比丘尼為比丘尼僧故往大僧中說三事自恣見聞疑誰諸大姊忍僧差某甲比丘尼為比丘尼僧故往大僧中說三事自恣見聞疑者默然誰不忍者說僧已忍差某甲比丘尼為比丘尼僧故往大僧中說三事自恣見聞疑竟僧忍默然故是事如是持彼獨行無護聽為護故應差二三比丘尼為伴使比丘尼對僧說自恣法此使比丘尼至比丘僧中禮僧足已曲身低頭合掌作如是說大德僧聽某處比丘尼僧夏安居竟比丘僧亦夏安居竟比丘尼僧說三事自恣見聞疑大德慈愍故語我我若見罪當如法懺悔三說此比丘尼禮僧足已還至本寺鳴椎集比丘尼衆不來者囑授告尼衆云大德僧衆不見比丘尼衆有見聞疑罪可舉語比丘尼衆如法自恣謹慎莫放逸作此告時尼衆皆合掌言頂戴持若比丘尼衆即日自恣疲極當明日自恣若二衆病不滿不和當遣使問訊若不爾者突吉羅白僧自恣時法自今已去聽安居竟自恣聽遮自恣不應求聽何以故自恣即是聽又不知今日自恣明日自恣佛言若小食上中食上上座唱言大姊僧聽今僧某月某日某時集某處自恣餘儀軌等並同說戒差受自恣人法律言聽白二羯磨差不愛不恚不怖不癡知自恣未自恣應如是差大姊僧聽若僧時到僧忍聽僧差某甲比丘尼作受自恣人白如是大姊僧聽僧差某甲比丘尼作受自恣人誰諸大姊忍僧差某甲比丘尼作受自恣人者默然誰不忍者說僧已忍差某甲比丘尼作受自恣人竟僧忍默然故是事如是持自恣白法律言聽比坐應知來不先白後自恣作如是白大姊僧聽今日衆僧自恣若僧時到僧忍聽僧和合自恣白如是僧自恣法律言聽徐徐三說了了自恣不應反抄衣衣纏頸等應偏露等作如是言也大姊衆僧今日自恣我某甲比丘尼亦自恣若見聞疑罪大姊哀愍故語我我若見罪當如法懺悔三說若病比丘尼佛聽隨身所安自恣其告清淨緣及法一同說戒略自恣法律言若有八難及餘緣聽略自恣若難事尚遠容得廣說應廣說若難事近不得三說當再說若不得再說應一說若不者如法治若難事近不得一說即應作白各各共三語自恣作如是白大姊僧聽若僧時到僧忍聽僧今各各共三語自恣白如是作是白已各各共三語自恣再說一說亦如是若難事近不得各各三語自恣亦不得白即應以此事去對首自恣法若有四人各各相向作如是言三大姊憶念今日衆僧自恣我某甲比丘尼自恣清淨三說若三人二人亦如是心念自恣法若有一人應心念言今日衆僧自恣我某甲比丘尼自恣清淨三說增益自恣法若有衆多比丘尼結安居精勤行道得增上果證作如是念我曹若今日自恣便應移住餘處恐不得如是樂彼比丘尼作白增益自恣作如是白大姊僧聽若僧時到僧忍聽僧今日不自恣四月滿當自恣白如是作是白已至四月滿自恣增減自恣法律言若自恣日聞異住所比丘尼鬪諍不和欲來此自恣彼比丘尼應作若二若三減日自恣若聞已入界應為具洗浴器等安置已至界外自恣若能如是方便作者善若不能者彼作白增上自恣作如是白大姊僧聽若僧時到僧忍聽僧今日不自恣至黑月十五日當自恣白如是作是白已增上自恣若客比丘尼至黑月者舊比丘尼應作白第二增上自恣作如是白大姊僧聽若僧時到僧忍聽僧今日不自恣後白月十五日當自恣白如是若客比丘尼猶不去舊比丘尼應如法如律強和合自恣衣鉢藥受淨篇第九受五衣法依十誦云大姊一心念我比丘尼某甲是衣僧伽梨若干條受若干長若干短割截衣持三說受次二衣類准亦爾受覆肩衣應云大姊一心念我比丘尼某甲是衣覆肩衣受長四肘廣二肘半是覆肩衣持三說受厥修羅衣云大姊一心念我比丘尼某甲是衣厥修羅衣受長四肘廣二肘半是衣厥修羅衣持三說捨五衣法應翻受云大姊一心念我比丘尼某甲是衣僧伽梨若干條受若干長若干短割截衣持今捨三說下四例此各翻應知受尼師壇法應云大姊一心念我比丘尼某甲此尼師壇是我助身衣受三說餘助身衣受同此法捨者翻受應知受鉢法律言鉢有二種一瓦二鐵色亦二種一赤二黑大者三斗小者一升半此應持應淨施持准十誦云大姊一心念我比丘尼某甲此鉢多羅應量受長用故三說捨者翻受應知受十六枚器法律言比丘尼即日得器應即日受可須用者十六枚餘者當淨施若遣與人十六枚者大釜及蓋小釜亦爾水瓶及蓋洗瓶亦爾四盆及杓二小二大受云大姊一心念我比丘尼某甲此某器是我十六枚數今受三說受非時藥法律言聽飲八種漿一梨漿二閻浮果漿三酸棗漿四甘蔗漿五微果漿六舍樓迦漿七波樓師漿八蒲萄漿若不醉人應非時飲若醉人不應飲若飲如法治應先從淨人手受已次對比丘尼如法云大姊一心念我比丘尼某甲有某病緣故此某甲非時漿為經非時服故今於大姊邊受三說受餘二藥法同七日應言為共宿七日服故盡形應言為共宿長服故七日藥者酥等盡形藥者一切醎醋等不任為食者真實淨法應云大姊一心念我有此長衣未作淨今為淨故捨與大姊為真實淨故作真實淨應問施主然後得著鉢藥及十六枚類同展轉淨法應云大姊一心念此是我長衣未作淨為淨故施與大姊為展轉淨故彼受淨者應云大姊汝有此長衣未作淨為淨故與我我今受之受已語言汝施與誰彼應答言施與某甲受淨者言大姊汝是長衣未作淨為淨故施與我我今受之受已汝與某甲是衣某甲己有汝為某甲善護持著隨因緣展轉淨施若問不問聽隨意著鉢藥及十六枚作法亦同唯稱事別為異
